[window]
opacity = 0.90
padding = { x = 10, y = 10 }
dynamic_padding = true
decorations = "full"
startup_mode = "Windowed"

[font]
size = 11

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[cursor]
style = { shape = "Beam", blinking = "On" }

[scrolling]
history = 10000

#[selection]
#save_to_clipboard = true

#[terminal]
#shell = "/usr/bin/zsh"

[mouse]
hide_when_typing = true
